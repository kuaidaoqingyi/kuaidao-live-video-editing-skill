project:
  id: "YYYYMMDD-topic-slug"
  title: ""
  owner: ""
  status: "ingest"
  working_dir: ""
  delivery_dir: ""

planning:
  mode: "new-edit" # new-edit | continue-edit | iteration | single-surface
  gates_checked: false
  latest_cut_plan: "cut-plan.md"
  brief_ready: false
  candidate_pool_ready: false
  storyboard_ready: false
  open_questions: []

iteration:
  active: false
  last_review_notes: ""
  impact_level: "" # light | medium | heavy
  affected_scenes: []
  next_version: ""

source:
  original_video: ""
  raw_link: "media/raw.mp4"
  duration: ""
  width: 1080
  height: 1920
  fps: 30
  orientation: "vertical"
  do_not_copy_original: true

goal:
  platform: ""
  target_duration: "5-10 min"
  audience: ""
  story_type: ""
  core_information: ""
  cold_viewer_promise: ""
  desired_emotion: ""
  conversion_goal: ""
  must_keep: []
  must_remove: []

glossary:
  people:
    - canonical: ""
      aliases: []
      pronoun: ""
  works:
    - canonical: ""
      aliases: []
  locations:
    - canonical: ""
      aliases: []
  common_asr_errors:
    - wrong: ""
      correct: ""

asr:
  provider: "StepFun/StepAudio"
  api_key_lookup:
    - "macOS Keychain service STEPFUN_API_KEY"
    - "env STEPFUN_API_KEY"
    - "env STEP_API_KEY"
  api_key_env: "STEPFUN_API_KEY or STEP_API_KEY"
  api_doc: "https://platform.stepfun.com/docs/zh/guides/models/stepaudio-2.5-asr"
  raw_json: "notes/raw-transcript.json"
  raw_srt: "notes/raw-transcript.srt"
  corrected_srt: "subtitles.srt"

tts:
  provider: "StepFun/StepAudio"
  model: "stepaudio-2.5-tts"
  preferred_voice: "ruyananshi"
  speed: 1.12
  fallback_requires_user_approval: true

story:
  candidate_windows: "notes/candidate-windows.md"
  cut_plan: "cut-plan.md"
  edit_notes: "edit-notes.md"
  required_context: []
  must_keep: []
  must_remove: []

visuals:
  cover_style_refs: []
  cover_candidates_dir: "frames/cover-options"
  assets: []
  subtitle_zone: ""
  pip_rules: []
  anti_examples: []

render:
  engine: "HyperFrames"
  composition: "index.html"
  latest_version: ""
  latest_render: ""
  versions_dir: "renders/versions"

qa:
  ffprobe_checked: false
  subtitle_checked: false
  visual_checked: false
  audio_checked: false
  story_gates_checked: false
  notes: ""
